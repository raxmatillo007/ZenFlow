<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15133A"/>
      <stop offset="1" stop-color="#061B46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1B2748" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0C1730" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
    <filter id="glowGreen" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#4ADE80" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGold" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#FBBF24" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <text x="70" y="90" fill="url(#title)" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">ZenFlow Oak Stages Preview</text>
  <text x="70" y="130" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Katta bosqichlar qanday ko‘rinishini ko‘rish uchun preview</text>

