      <ellipse cx="0" cy="31" rx="24" ry="6" fill="#166534" opacity="0.95"/>
      <path d="M0 -8 C-12 -8 -22 3 -22 18 C-22 32 -12 42 0 42 C12 42 22 32 22 18 C22 3 12 -8 0 -8 Z" fill="#92400E"/>
      <path d="M0 -8 C7 -8 14 -3 16 8 C8 10 1 5 0 -8 Z" fill="#D97706"/>
      <path d="M0 -2 C-7 -2 -13 4 -13 14 C-13 22 -7 28 0 28 C7 28 13 22 13 14 C13 4 7 -2 0 -2 Z" fill="#B45309"/>
